name: Validate Breach Cases

on:
  pull_request:
    paths:
      - "cases/**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml

      - run: python scripts/validate_cases.py